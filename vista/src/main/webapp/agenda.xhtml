<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>SiPsi - Mis Citas</title>
    <style>
        body {
            font-family: 'Archivo', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
        }


        .header-top {
            background-color: #833D3D;
            color: #FFFFFF;
            padding: 20px 40px;
            font-size: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        .btn-logout-header {
            background: transparent !important;
            border: none !important;
            color: #EAEAEA !important;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Archivo', Arial, sans-serif;
        }
        .btn-logout-header:hover {
            color: #FFFFFF !important;
        }

        .container { padding: 30px; }


        .modal-sipsi.ui-dialog { border: none !important; box-shadow: 0px 5px 15px rgba(0,0,0,0.3); }
        .modal-sipsi .ui-dialog-content { background-color: #FFFFFF !important; padding: 30px !important; border-radius: 8px !important; }


        .modal-sin-header .ui-dialog-titlebar { display: none !important; }


        .btn-cancelar { background: #FFFFFF !important; color: #808080 !important; border: 1px solid #EAEAEA !important; border-radius: 4px; font-family: 'Archivo', Arial, sans-serif; padding: 5px 15px !important;}
        .btn-cancelar:hover { background: #EAEAEA !important; color: #833D3D !important; }


        .btn-peligro { background-color: #FF0707 !important; border: none !important; color: #FFFFFF !important; border-radius: 4px; font-family: 'Archivo', Arial, sans-serif; padding: 5px 15px !important;}
        .btn-peligro:hover { background-color: #cc0000 !important; }
    </style>
</h:head>
<h:body>

    <div class="header-top">
        <span>Mis Citas</span>

        <h:form style="margin: 0;">
            <p:commandLink value="Cerrar sesión"
                           styleClass="btn-logout-header"
                           onclick="PF('dlgCerrarSesion').show(); return false;" />
        </h:form>
    </div>

    <div class="container">
    </div>

    <h:form id="formModalCerrarSesion">
        <p:dialog widgetVar="dlgCerrarSesion" modal="true" closable="false" resizable="false" showEffect="fade" hideEffect="fade" styleClass="modal-sipsi modal-sin-header">

            <div style="padding: 10px 20px; color: #833D3D; font-size: 18px; text-align: center; font-weight: bold; font-family: 'Archivo', Arial, sans-serif;">
                ¿Seguro que quieres cerrar sesión?
            </div>

            <div style="display: flex; justify-content: center; gap: 15px; margin-top: 25px;">
                <p:commandButton value="Cancelar"
                                 type="button"
                                 onclick="PF('dlgCerrarSesion').hide();"
                                 styleClass="btn-cancelar"/>

                <p:commandButton value="Cerrar sesión"
                                 action="#{loginBean.cerrarSesion()}"
                                 oncomplete="PF('dlgCerrarSesion').hide();"
                                 styleClass="btn-peligro" />
            </div>
        </p:dialog>
    </h:form>

</h:body>
</html>
